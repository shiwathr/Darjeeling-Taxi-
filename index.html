<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Darjeeling Taxi Service</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f5f5f5;
}

header {
  background: #111;
  color: white;
  padding: 15px;
  text-align: center;
}

nav {
  background: #ff9800;
  padding: 10px;
  text-align: center;
}

nav a {
  color: black;
  margin: 10px;
  text-decoration: none;
  font-weight: bold;
}

.hero {
  background: url('https://images.unsplash.com/photo-1544989164-31d6fcd130a1') no-repeat center/cover;
  height: 250px;
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  font-weight: bold;
}

.container {
  padding: 20px;
}

.card {
  background: white;
  padding: 15px;
  margin: 10px 0;
  border-radius: 10px;
}

button {
  background: green;
  color: white;
  padding: 10px;
  border: none;
  width: 100%;
  font-size: 16px;
  border-radius: 5px;
}

footer {
  background: #111;
  color: white;
  text-align: center;
  padding: 10px;
}
</style>

</head>
<body>

<header>
  <h1>🚕 Darjeeling Taxi Service</h1>
  <p>Safe • Reliable • Affordable</p>
</header>

<nav>
  <a href="#home">Home</a>
  <a href="#booking">Book Now</a>
  <a href="#contact">Contact</a>
</nav>

<div class="hero">
  Book Your Ride in Seconds
</div>

<div class="container">

  <div class="card" id="booking">
    <h2>📍 Book a Taxi</h2>
    
    <input type="text" id="name" placeholder="Your Name" style="width:100%;padding:10px;margin:5px 0;">
    <input type="text" id="pickup" placeholder="Pickup Location" style="width:100%;padding:10px;margin:5px 0;">
    <input type="text" id="drop" placeholder="Drop Location" style="width:100%;padding:10px;margin:5px 0;">
    
    <button onclick="bookTaxi()">Book via WhatsApp</button>
  </div>

  <div class="card">
    <h2>🚗 Our Services</h2>
    <p>✔ Local Taxi</p>
    <p>✔ Airport Pickup</p>
    <p>✔ Sightseeing Tours</p>
  </div>

  <div class="card" id="contact">
    <h2>📞 Contact Us</h2>
    <p>Phone: +91 8207219672</p>
    <p>Location: Darjeeling</p>
  </div>

</div>

<footer>
  © 2026 Darjeeling Taxi Service
</footer>

<script>
function bookTaxi() {
  let name = document.getElementById("name").value;
  let pickup = document.getElementById("pickup").value;
  let drop = document.getElementById("drop").value;

  let message = `Name: ${name}%0APickup: ${pickup}%0ADrop: ${drop}`;
  
  let phone = "918207219672";

  let url = `https://wa.me/${phone}?text=${message}`;
  
  window.open(url, "_blank");
}
</script>

</body>
</html>
