
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Darjeelingtaxi service | Safe, Reliable, Everywhere</title>
    
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #FDFDFD;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
            text-align: left;
        }
        
        .bg-yellow-brand { background-color: #FFC801; }
        .text-yellow-brand { color: #FFC801; }
        
        .card-shadow {
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 10px 10px -5px rgba(0, 0, 0, 0.02);
        }

        .hero-main-bg {
            background: linear-gradient(135deg, rgba(15, 23, 42, 0.6) 0%, rgba(30, 41, 59, 0.8) 100%), 
                        url('https://lh3.googleusercontent.com/d/1hVvJE_LnnqG4K5kTTLvUU7qm1i-UYoh3');
            background-size: cover;
            background-position: center;
        }

        .page-content {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .page-hidden {
            display: none;
            opacity: 0;
            transform: translateY(20px);
        }

        .page-active {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

        #sidebar-menu {
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            transform: translateX(-100%);
        }
        #sidebar-menu.open {
            transform: translateX(0);
        }
        #sidebar-overlay {
            transition: opacity 0.4s ease;
            pointer-events: none;
            opacity: 0;
        }
        #sidebar-overlay.open {
            pointer-events: auto;
            opacity: 1;
        }

        .form-input {
            transition: all 0.3s ease;
            border: 2px solid transparent;
            background-color: #F3F4F6;
        }
        
        .form-input:focus {
            border-color: #FFC801;
            background-color: white;
            box-shadow: 0 0 0 4px rgba(255, 200, 1, 0.15);
        }

        #toast {
            transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            transform: translateY(150%) translateX(-50%);
        }
        #toast.show {
            transform: translateY(0) translateX(-50%);
        }

        .tap-scale:active {
            transform: scale(0.95);
        }

        .glass-pill {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(4px);
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-24 lg:pb-0 text-slate-800">

    <!-- Sidebar Menu Overlay -->
    <div id="sidebar-overlay" onclick="toggleMenu()" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[60]"></div>
    
    <!-- Sidebar Menu Content -->
    <aside id="sidebar-menu" class="fixed top-0 left-0 bottom-0 w-72 bg-white z-[70] shadow-2xl flex flex-col text-left">
        <div class="p-8 border-b border-gray-100 flex flex-col gap-4">
            <div class="flex items-center justify-between w-full">
                <div class="flex items-center gap-2">
                    <i data-lucide="taxi" class="text-yellow-brand w-6 h-6"></i>
                    <span class="font-bold text-lg tracking-tight">Darjeelingtaxi</span>
                </div>
                <button onclick="toggleMenu()" class="w-8 h-8 flex items-center justify-center rounded-full bg-gray-50 text-slate-400 tap-scale">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            <!-- User Status in Sidebar -->
            <div id="user-sidebar-info" class="flex items-center gap-3 mt-4 p-3 bg-slate-50 rounded-2xl hidden">
                <img id="user-sidebar-img" src="" class="w-10 h-10 rounded-full border-2 border-white shadow-sm">
                <div class="overflow-hidden">
                    <p id="user-sidebar-name" class="text-sm font-bold truncate">User</p>
                    <p class="text-[10px] text-slate-400 font-bold uppercase">Member</p>
                </div>
            </div>
        </div>
        
        <nav class="flex-1 p-6 space-y-1">
            <button onclick="switchPage('home'); toggleMenu();" class="w-full flex items-center gap-4 p-3 rounded-xl hover:bg-yellow-50 font-bold text-slate-700 transition-colors group text-sm text-left">
                <i data-lucide="home" class="w-4 h-4 group-hover:text-yellow-600"></i> Home
            </button>
            <button onclick="switchPage('tours'); toggleMenu();" class="w-full flex items-center gap-4 p-3 rounded-xl hover:bg-yellow-50 font-bold text-slate-700 transition-colors group text-sm text-left">
                <i data-lucide="map" class="w-4 h-4 group-hover:text-yellow-600"></i> Sightseeing
            </button>
            <button onclick="switchPage('pickup'); toggleMenu();" class="w-full flex items-center gap-4 p-3 rounded-xl hover:bg-yellow-50 font-bold text-slate-700 transition-colors group text-sm text-left">
                <i data-lucide="plane-takeoff" class="w-4 h-4 group-hover:text-yellow-600"></i> Pickup & Drop
            </button>
            <button onclick="switchPage('profile'); toggleMenu();" class="w-full flex items-center gap-4 p-3 rounded-xl hover:bg-yellow-50 font-bold text-slate-70
